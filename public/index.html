<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LineupLines — Demo</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;margin:24px}pre{background:#f6f8fa;padding:12px;border-radius:6px}</style>
</head>
<body>
  <h1>LineupLines — Latest Vegas Lines (Demo) ⚡</h1>
  <p>Fetches <code>/lines/latest</code> and shows raw JSON.</p>
  <button id="refresh">Refresh</button>
  <div id="out"><em>Click Refresh to load</em></div>

  <script>
    async function fetchLatest() {
      const out = document.getElementById('out');
      out.innerHTML = 'Loading...';
      try {
        const res = await fetch('/lines/latest');
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const data = await res.json();
        out.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
      } catch (err) {
        out.innerHTML = '<div style="color:crimson">Error: ' + err + '</div>';
      }
    }

    document.getElementById('refresh').addEventListener('click', fetchLatest);
  </script>
</body>
</html>
